<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>404 — 页面不存在 · Claude AI 教程</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/base.css" />

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-page {
      text-align: center;
      max-width: 480px;
    }

    .error-page__code {
      font-family: var(--font-code);
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .error-page__title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 0.75rem;
    }

    .error-page__desc {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .error-page__actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn--primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .btn--primary:hover {
      background: var(--color-primary-dark);
      color: #fff;
    }

    .btn--outline {
      background: transparent;
      color: var(--color-primary-light);
      border-color: var(--color-primary);
    }
    .btn--outline:hover {
      background: var(--color-primary-muted);
      color: var(--color-primary-light);
    }

    .error-page__hint {
      margin-top: 2.5rem;
      padding: 1rem 1.25rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      text-align: left;
    }

    .error-page__hint code {
      font-family: var(--font-code);
      font-size: 0.8125em;
      background: var(--color-code-bg);
      border: 1px solid var(--color-code-border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      color: var(--color-primary-light);
    }
  </style>

  <script src="/assets/js/theme.js"></script>
</head>
<body>

  <div class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">页面不存在</h1>
    <p class="error-page__desc">
      你访问的页面已被移动、删除，或者链接输入有误。<br />
      不用担心，教程内容都在这里。
    </p>

    <div class="error-page__actions">
      <a class="btn btn--primary" href="/index.html">回到首页</a>
      <a class="btn btn--outline" href="/chapters/01-intro/index.html">从第一章开始</a>
    </div>

    <div class="error-page__hint">
      <strong style="color: var(--color-text)">常见章节入口</strong>
      <ul style="list-style:none;padding:0;margin:0.75rem 0 0;display:flex;flex-direction:column;gap:0.375rem;">
        <li><a href="/chapters/02-cli-start/index.html" style="color:var(--color-primary-light);text-decoration:none;">第二章：Claude Code CLI 入门</a></li>
        <li><a href="/chapters/04-dot-claude/index.html" style="color:var(--color-primary-light);text-decoration:none;">第四章：.claude 目录完全指南</a></li>
        <li><a href="/chapters/06-api/index.html" style="color:var(--color-primary-light);text-decoration:none;">第六章：Anthropic API 使用</a></li>
        <li><a href="/chapters/09-projects/index.html" style="color:var(--color-primary-light);text-decoration:none;">第九章：实战项目案例</a></li>
      </ul>
    </div>
  </div>

</body>
</html>
